name: NuGet Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Require NuGet API key
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "::error::secrets.NUGET_API_KEY is not set or empty"
            exit 1
          fi

      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.x"

      - name: Resolve package version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Publishing version: $VERSION (from tag $TAG)"

      - name: Pack library projects
        run: |
          set -e
          mkdir -p artifacts
          pack() {
            dotnet pack "$1" \
              -c Release \
              --output artifacts \
              -p:Version="$VERSION" \
              -p:PackageVersion="$VERSION"
          }
          pack Source/DRPC.Attribute/DRPC.Attribute.csproj
          pack Source/DRPC.Shared/DRPC.Shared.csproj
          pack Source/DRPC.Client/DRPC.Client.csproj
          pack Source/DRPC.Server/DRPC.Server.csproj
          pack Source/DRPC.CodeGenerator/DRPC.CodeGenerator.csproj

      - uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/*.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
